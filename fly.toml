# Fly.io deploy (one command: `fly launch` then `fly deploy`). Gives a real
# https://<app>.fly.dev URL — no cert warning, works over cellular.
# After first deploy:  fly secrets set PUBLIC_URL=https://<app>.fly.dev
# Optionally pin the director key:  fly secrets set HOST_KEY=<something-secret>
app = "itm-live-show"
primary_region = "arn"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[env]
  HTTP_ONLY = "1"
