<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Beacon · Live Show</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { margin: 0; min-height: 100%; background: #0a0710; color: #fff;
    font-family: system-ui, -apple-system, sans-serif; }
  body { min-height: 100vh; display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 1.1rem; padding: 1.5rem; text-align: center; }
  h1 { margin: 0; font-size: 1.4rem; }
  p { opacity: .65; max-width: 30ch; line-height: 1.4; margin: 0; font-size: .92rem; }
  .grid { display: grid; grid-template-columns: auto auto; gap: .5rem .7rem; align-items: center; }
  label { font: 600 13px system-ui; opacity: .8; text-align: right; }
  input { font: 600 15px system-ui; width: 90px; padding: .5rem; border-radius: 8px;
    border: 1px solid #ffffff2a; background: #00000040; color: #fff; }
  button { font-size: 1.15rem; padding: .9rem 2rem; border: 0; border-radius: 999px;
    background: #c9a8ff; color: #1a0633; font-weight: 800; cursor: pointer; }
  #status { font: 600 14px monospace; min-height: 1.2em; }
  #status.live { color: #19ff7a; }
  .big { font-size: 2.4rem; font-weight: 800; }
</style>
</head>
<body>
  <a href="/host" style="position:fixed;top:12px;left:14px;color:#8fd0ff;text-decoration:none;font-weight:700">← Host</a>
  <h1>📡 Positioning beacon</h1>
  <p>Place this device at a known spot, enter its position in metres, and start. It emits an inaudible ultrasonic chirp so phones can locate themselves. Use 3+ beacons.</p>
  <div class="grid">
    <label>x (m)</label><input id="x" type="number" step="0.1" value="0">
    <label>y (m)</label><input id="y" type="number" step="0.1" value="0">
  </div>
  <button id="start">▶ Start beacon</button>
  <div class="big" id="slot"></div>
  <div id="status">idle</div>
  <script type="module" src="/anchor.js"></script>
</body>
</html>
